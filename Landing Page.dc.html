<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  setVideoRef = (el) => {
    if (!el || this._videoEl === el) return;
    this._videoEl = el;
    el.loop = false;
    el.muted = false;
    el.volume = 1;
    // Try to play WITH sound. Most browsers block unmuted autoplay, so if
    // that's rejected, start muted and unmute on the visitor's first click.
    const playWithSound = () => {
      el.muted = false;
      return el.play();
    };
    const playMutedThenArmUnmute = () => {
      el.muted = true;
      el.play().catch(() => {});
      const unmute = () => {
        el.muted = false;
        el.volume = 1;
        window.removeEventListener('pointerdown', unmute);
        window.removeEventListener('keydown', unmute);
      };
      window.addEventListener('pointerdown', unmute);
      window.addEventListener('keydown', unmute);
    };
    const tryPlay = () => {
      playWithSound().catch(() => playMutedThenArmUnmute());
    };
    el.addEventListener('loadedmetadata', tryPlay);
    el.addEventListener('canplay', tryPlay);
    el.addEventListener('playing', () => { el.style.opacity = '1'; });
    el.addEventListener('error', () => console.error('video error', el.error));
    el.addEventListener('stalled', () => console.warn('video stalled'));
    // Fetch as a blob and hand the element an object URL — some serve
    // endpoints don't support the byte-range requests browsers issue
    // for direct <source> video loads, which stalls readyState at 0.
    const src = el.querySelector('source').src;
    fetch(src).then((r) => r.blob()).then((blob) => {
      const url = URL.createObjectURL(blob);
      el.src = url;
      el.load();
      tryPlay();
    }).catch((e) => console.error('video blob fetch failed', e));
  };
  renderVals() {
    return { setVideoRef: this.setVideoRef };
  }
}
</script>
